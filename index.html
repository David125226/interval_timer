<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2979ff" />
  <link rel="manifest" href="manifest.json" />
  <title>Group Fitness Interval Timer</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%); color: #f5f5f5; min-height: 100vh; }
    .page { max-width: 900px; margin: 0 auto; padding: 32px; }
    .hero { display: flex; flex-direction: column; align-items: center; gap: 16px; margin-bottom: 12px; }
    .logo { display: block; max-width: 360px; width: 100%; height: auto; border-radius: 24px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35); border: 1px solid rgba(255,255,255,0.14); }
    .logo-fullscreen { display: none; }
    .fullscreen-card .logo-fullscreen { display: block; max-width: 260px; width: 100%; height: auto; border-radius: 18px; box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35); border: 1px solid rgba(255,255,255,0.18); }
    h1 { margin: 0; font-size: 2.5rem; text-align: center; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
    .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 24px; margin-bottom: 24px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); transition: transform 0.3s ease, box-shadow 0.3s ease; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4); }
    .row { display: flex; flex-wrap: wrap; gap: 16px; align-items: end; }
    label { display: flex; flex-direction: column; font-size: 0.9rem; color: #b0bec5; font-weight: 500; }
    select, input[type="number"], input[type="text"] { width: 120px; padding: 12px 16px; margin-top: 8px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.05); color: #eee; font-size: 1rem; transition: border-color 0.3s ease, box-shadow 0.3s ease; }
    select:focus, input[type="number"]:focus, input[type="text"]:focus { outline: none; border-color: #4ecdc4; box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2); }
    .interval-row { display: grid; grid-template-columns: 130px 80px 80px 100px; gap: 12px; align-items: end; margin-bottom: 16px; padding: 16px; background: rgba(255, 255, 255, 0.02); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); transition: background 0.3s ease; }
    .interval-row:hover { background: rgba(255, 255, 255, 0.05); }
    .interval-row label { margin: 0; min-width: 0; }
    .interval-row select, .interval-row input[type="number"] { width: 100%; box-sizing: border-box; margin-top: 6px; }
    .interval-row button { width: 100%; min-width: 0; padding: 10px 12px; margin: 0; justify-self: stretch; box-sizing: border-box; }
    input[type="checkbox"] { margin-right: 12px; transform: scale(1.3); accent-color: #ff6b6b; }
    button { border: none; border-radius: 12px; padding: 14px 24px; margin: 8px 6px 0 0; font-size: 1rem; font-weight: 600; cursor: pointer; background: linear-gradient(45deg, #ff6b6b, #ffa726); color: white; transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3); }
    button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4); }
    button:active { transform: translateY(0); }
    button:disabled { background: #555; cursor: not-allowed; box-shadow: none; transform: none; }
    .status { font-size: 1.4rem; margin-bottom: 12px; text-align: center; font-weight: 600; color: #4ecdc4; }
    .timer-name { font-size: 1.8rem; margin-bottom: 12px; color: #e3f2fd; text-align: center; font-weight: 700; }
    .timer { font-size: 5rem; letter-spacing: 0.2em; margin: 0; text-align: center; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); transition: color 0.3s ease, text-shadow 0.3s ease; }
    .timer.updating { animation: pulse 0.5s ease; }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); color: #4ecdc4; text-shadow: 0 0 30px rgba(78, 205, 196, 0.8); }
      100% { transform: scale(1); }
    }
    .details { font-size: 1.1rem; color: #b0bec5; margin-top: 12px; text-align: center; font-weight: 500; }
    .footer { margin-top: 24px; color: #90a4ae; font-size: 1rem; text-align: center; }
    .fullscreen-card {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 32px;
      margin: 0;
      padding: 0 32px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      border: none;
      border-radius: 0;
      box-sizing: border-box;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .fullscreen-card .status {
      font-size: 3.5rem;
      margin: 0;
      font-weight: 700;
      color: #4ecdc4;
    }
    .fullscreen-card .timer {
      font-size: 14rem;
      margin: 24px 0;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px rgba(255, 255, 255, 0.7);
    }
    .fullscreen-card .details {
      font-size: 2.8rem;
      margin: 0;
      font-weight: 600;
    }
    .fullscreen-card div:last-child {
      margin-top: 40px;
    }
    .fullscreen-card button {
      font-size: 1.8rem;
      padding: 20px 40px;
      margin: 12px;
      font-weight: 700;
      background: linear-gradient(45deg, #ff6b6b, #ffa726);
      box-shadow: 0 6px 25px rgba(255, 107, 107, 0.4);
    }
    .fullscreen-card button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255, 107, 107, 0.5);
    }
  </style>
</head>
<body>
  <div class="page">
      <div class="hero">
        <img class="logo" src="ff_logo.PNG" alt="Fit Factory logo">
        <h1>Group Fitness Interval Timer</h1>
      </div>
      <div class="card">
        <div style="margin-top: 20px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px;">
            <strong>Interval sequence</strong>
            <button id="addStepBtn" type="button">Add interval</button>
          </div>
        <div id="intervalList"></div>
      </div>
      <div class="row" style="margin-top: 20px;">
        <label>Rounds
          <input id="rounds" type="number" min="1" value="8" />
        </label>
        <label>Repeat sessions
          <select id="repeatCount">
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </label>
        <label>Delay between sessions
          <div style="display:flex; align-items:center; gap:8px;">
            <input id="repeatDelay" type="number" min="0" value="15" style="width: 100px;" />
            <span style="font-size:0.9rem; color:#90a4ae;">sec</span>
          </div>
        </label>
        <label style="flex-direction: row; align-items: center; margin-top: 18px;">
          <input id="fullscreen" type="checkbox" checked />
          Fullscreen on start
        </label>
      </div>
      <div class="row" style="margin-top: 20px;">
        <label>Timer name
          <input id="timerName" type="text" placeholder="e.g., HIIT Session" style="width: 200px;" />
        </label>
        <button id="saveBtn" type="button" style="margin-top: 24px;">Save Timer</button>
      </div>
      <div class="row" style="margin-top: 20px;">
        <label>Load saved timer
          <select id="loadTimer">
            <option value="">-- Select a timer --</option>
          </select>
        </label>
        <button id="deleteBtn" type="button" style="margin-top: 24px;" disabled>Delete Selected</button>
      </div>
    </div>

    <div class="card" style="text-align:center;" id="timerCard">
      <img class="logo-fullscreen" src="ff_logo.PNG" alt="Fit Factory logo" />
      <div class="timer-name" id="timerNameDisplay">Untitled Timer</div>
      <div class="status" id="status">Ready to start</div>
      <p class="timer" id="time">00:30</p>
      <div class="details" id="details">Work, step 1 of 4, round 1 of 8</div>
      <div style="margin-top: 20px;">
        <button id="startBtn">Start</button>
        <button id="pauseBtn" disabled>Pause</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="footer">v0.5/code></div>
  </div>

  <script>
    const roundsInput = document.getElementById('rounds');
    const repeatCountInput = document.getElementById('repeatCount');
    const repeatDelayInput = document.getElementById('repeatDelay');
    const fullscreenInput = document.getElementById('fullscreen');
    const intervalList = document.getElementById('intervalList');
    const addStepBtn = document.getElementById('addStepBtn');
    const timerNameInput = document.getElementById('timerName');
    const saveBtn = document.getElementById('saveBtn');
    const loadTimerSelect = document.getElementById('loadTimer');
    const deleteBtn = document.getElementById('deleteBtn');
    const statusEl = document.getElementById('status');
    const timeEl = document.getElementById('time');
    const detailsEl = document.getElementById('details');
    const timerNameDisplay = document.getElementById('timerNameDisplay');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const timerCard = document.getElementById('timerCard');

    if (!isFullscreenSupported()) {
      fullscreenInput.checked = false;
      fullscreenInput.disabled = true;
      fullscreenInput.parentElement.style.opacity = '0.5';
      fullscreenInput.parentElement.title = 'Fullscreen not supported on this device';
    }

    let timerId = null;
    let timeLeft = 0;
    let round = 1;
    let stepIndex = 0;
    let currentSession = 1;
    let active = false;
    let isCountdown = false;
    let isBetweenRepeats = false;
    let countdownTime = 0;
    let repeatDelayLeft = 0;

    function isFullscreenSupported() {
      return !!(document.fullscreenEnabled || document.webkitFullscreenEnabled || document.mozFullScreenEnabled || document.msFullscreenEnabled);
    }

    function enterFullscreen() {
      if (!isFullscreenSupported()) return;
      const elem = timerCard;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
      } else if (elem.mozRequestFullScreen) {
        elem.mozRequestFullScreen();
      } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
      }
    }

    function updateFullscreenClass() {
      const isFull = document.fullscreenElement === timerCard
        || document.webkitFullscreenElement === timerCard
        || document.mozFullScreenElement === timerCard
        || document.msFullscreenElement === timerCard;
      timerCard.classList.toggle('fullscreen-card', Boolean(isFull));
    }

    function onFullscreenChange() {
      updateFullscreenClass();
    }

    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    document.addEventListener('mozfullscreenchange', onFullscreenChange);
    document.addEventListener('MSFullscreenChange', onFullscreenChange);

    function exitFullscreen() {
      if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.mozCancelFullScreen) {
          document.mozCancelFullScreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
    }

    function createIntervalRow(step = { type: 'Work', min: 0, sec: 30 }) {
      const row = document.createElement('div');
      row.className = 'interval-row';
      row.innerHTML = `
        <label>
          Type
          <select class="interval-type">
            <option value="Work">Work</option>
            <option value="Rest">Rest</option>
          </select>
        </label>
        <label>
          Minutes
          <input class="interval-min" type="number" min="0" value="${step.min}" />
        </label>
        <label>
          Seconds
          <input class="interval-sec" type="number" min="0" max="59" value="${step.sec}" />
        </label>
        <button type="button" class="remove-step">Remove</button>
      `;
      const typeSelect = row.querySelector('.interval-type');
      const minInput = row.querySelector('.interval-min');
      const secInput = row.querySelector('.interval-sec');
      const removeBtn = row.querySelector('.remove-step');
      typeSelect.value = step.type;
      const resetOnChange = () => resetTimer();
      typeSelect.addEventListener('change', resetOnChange);
      minInput.addEventListener('input', resetOnChange);
      secInput.addEventListener('input', resetOnChange);
      removeBtn.addEventListener('click', () => {
        if (intervalList.children.length > 1) {
          row.remove();
          resetTimer();
        }
      });
      return row;
    }

    function setDefaultIntervals() {
      intervalList.innerHTML = '';
      const defaults = [
        { type: 'Work', min: 0, sec: 30 },
        { type: 'Rest', min: 0, sec: 15 },
        { type: 'Work', min: 0, sec: 30 },
        { type: 'Rest', min: 0, sec: 15 },
      ];
      defaults.forEach(step => intervalList.appendChild(createIntervalRow(step)));
    }

    function getIntervalData() {
      return Array.from(intervalList.children).map(row => {
        const type = row.querySelector('.interval-type').value;
        const min = Number(row.querySelector('.interval-min').value) || 0;
        const sec = Number(row.querySelector('.interval-sec').value) || 0;
        return { type, min, sec };
      });
    }

    function loadIntervalData(intervals) {
      intervalList.innerHTML = '';
      intervals.forEach(step => intervalList.appendChild(createIntervalRow(step)));
    }

    function saveTimer() {
      const name = timerNameInput.value.trim();
      if (!name) {
        alert('Please enter a timer name');
        return;
      }
      const timerData = {
        intervals: getIntervalData(),
        rounds: roundsInput.value,
        repeatCount: repeatCountInput.value,
        repeatDelay: repeatDelayInput.value,
        fullscreen: fullscreenInput.checked,
      };
      localStorage.setItem(`timer_${name}`, JSON.stringify(timerData));
      timerNameInput.value = '';
      populateSavedTimers();
      alert(`Timer "${name}" saved!`);
    }

    function populateSavedTimers() {
      loadTimerSelect.innerHTML = '<option value="">-- Select a timer --</option>';
      const keys = Object.keys(localStorage).filter(k => k.startsWith('timer_'));
      keys.forEach(key => {
        const name = key.replace('timer_', '');
        const option = document.createElement('option');
        option.value = name;
        option.textContent = name;
        loadTimerSelect.appendChild(option);
      });
      deleteBtn.disabled = loadTimerSelect.options.length <= 1;
    }

    function loadTimer() {
      const name = loadTimerSelect.value;
      if (!name) return;
      const data = JSON.parse(localStorage.getItem(`timer_${name}`));
      loadIntervalData(data.intervals);
      roundsInput.value = data.rounds;
      repeatCountInput.value = data.repeatCount ?? (data.repeat ? 1 : 0) ?? 0;
      repeatDelayInput.value = data.repeatDelay ?? 15;
      fullscreenInput.checked = data.fullscreen;
      timerNameInput.value = name;
      resetTimer();
    }

    function deleteTimer() {
      const name = loadTimerSelect.value;
      if (!name) return;
      if (confirm(`Delete timer "${name}"?`)) {
        localStorage.removeItem(`timer_${name}`);
        populateSavedTimers();
        resetTimer();
      }
    }

    function getSettings() {
      const steps = Array.from(intervalList.children).map(row => {
        const type = row.querySelector('.interval-type').value;
        const min = Number(row.querySelector('.interval-min').value) || 0;
        const sec = Number(row.querySelector('.interval-sec').value) || 0;
        return { type, duration: Math.max(1, min * 60 + sec) };
      }).filter(step => step.duration > 0);
      return {
        steps: steps.length ? steps : [{ type: 'Work', duration: 30 }],
        rounds: Math.max(1, Number(roundsInput.value) || 1),
        repeatCount: Math.max(0, Number(repeatCountInput.value) || 0),
        repeatDelay: Math.max(0, Number(repeatDelayInput.value) || 0),
      };
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function getPhaseLabel(type) {
      if (type === 'Work' || type === 'High' || type === 'Low') return 'Work';
      return 'Rest';
    }

    function updateDisplay() {
      const settings = getSettings();
      const timerName = timerNameInput.value.trim() || 'Untitled Timer';
      timerNameDisplay.textContent = timerName;
      if (isCountdown) {
        statusEl.textContent = 'Get Ready';
        timeEl.textContent = countdownTime.toString();
        detailsEl.textContent = 'Starting in...';
      } else if (isBetweenRepeats) {
        const totalSessions = 1 + settings.repeatCount;
        statusEl.textContent = 'Rest before next session';
        timeEl.textContent = formatTime(repeatDelayLeft);
        detailsEl.textContent = `Next session ${currentSession} of ${totalSessions} starts soon`;
      } else {
        const step = settings.steps[stepIndex];
        const phase = getPhaseLabel(step.type);
        const totalWorkIntervals = settings.steps.filter(s => s.type === 'Work' || s.type === 'High' || s.type === 'Low').length;
        const currentWorkInterval = settings.steps.slice(0, stepIndex + 1).filter(s => s.type === 'Work' || s.type === 'High' || s.type === 'Low').length;
        statusEl.textContent = active ? `${phase}` : `${phase} ready`;
        timeEl.textContent = formatTime(timeLeft);
        detailsEl.textContent = `Interval ${currentWorkInterval} of ${totalWorkIntervals}`;
      }
      pauseBtn.disabled = !active;
    }

    function playBeep(type) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        let frequencies = [];
        let durations = [];
        if (type === 'Work' || type === 'High' || type === 'Low') {
          frequencies = [880, 1100, 1320];
          durations = [0.08, 0.08, 0.08];
        } else { // Rest
          frequencies = [440, 330, 220];
          durations = [0.15, 0.15, 0.15];
        }
        let startTime = ctx.currentTime;
        frequencies.forEach((freq, index) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.2, startTime);
          gain.gain.exponentialRampToValueAtTime(0.01, startTime + durations[index]);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(startTime);
          osc.stop(startTime + durations[index]);
          startTime += durations[index];
        });
      } catch (error) {
        console.warn('Audio unavailable', error);
      }
    }

    function advanceStep() {
      const settings = getSettings();
      stepIndex += 1;
      if (stepIndex >= settings.steps.length) {
        round += 1;
        if (round > settings.rounds) {
          const totalSessions = 1 + settings.repeatCount;
          if (currentSession < totalSessions) {
            currentSession += 1;
            if (settings.repeatDelay > 0) {
              isBetweenRepeats = true;
              repeatDelayLeft = settings.repeatDelay;
              statusEl.textContent = 'Rest before next session';
              detailsEl.textContent = `Next session ${currentSession} of ${totalSessions} starts soon`;
              return;
            }
            round = 1;
            stepIndex = 0;
            timeLeft = settings.steps[0].duration;
            const firstType = settings.steps[0].type;
            statusEl.textContent = getPhaseLabel(firstType);
            playBeep(firstType);
            return;
          }
          clearInterval(timerId);
          timerId = null;
          active = false;
          statusEl.textContent = 'Done — great work!';
          detailsEl.textContent = `Completed ${settings.rounds} rounds.`;
          pauseBtn.disabled = true;
          exitFullscreen();
          playBeep('Work');
          return;
        }
        stepIndex = 0;
      }
      timeLeft = settings.steps[stepIndex].duration;
      const nextType = settings.steps[stepIndex].type;
      if (nextType === 'Work' || nextType === 'High' || nextType === 'Low') {
        statusEl.textContent = 'Back to work';
        playBeep('Work');
      } else {
        statusEl.textContent = 'Take a rest';
        playBeep('Rest');
      }
      timeEl.classList.add('updating');
      setTimeout(() => timeEl.classList.remove('updating'), 500);
    }

    function startTimer() {
      const settings = getSettings();
      if (!timerId) {
        if (!active) {
          isCountdown = true;
          countdownTime = 3;
          active = true;
          pauseBtn.disabled = false;
          if (fullscreenInput.checked) {
            enterFullscreen();
          }
        }
        timerId = setInterval(() => {
          if (isCountdown) {
            countdownTime--;
            if (countdownTime <= 0) {
              isCountdown = false;
              timeLeft = settings.steps[0].duration;
              const firstType = settings.steps[0].type;
              statusEl.textContent = getPhaseLabel(firstType);
              playBeep(firstType);
              timeEl.classList.add('updating');
              setTimeout(() => timeEl.classList.remove('updating'), 500);
            }
          } else if (isBetweenRepeats) {
            repeatDelayLeft -= 1;
            if (repeatDelayLeft <= 0) {
              isBetweenRepeats = false;
              round = 1;
              stepIndex = 0;
              timeLeft = settings.steps[0].duration;
              const firstType = settings.steps[0].type;
              statusEl.textContent = getPhaseLabel(firstType);
              playBeep(firstType);
              timeEl.classList.add('updating');
              setTimeout(() => timeEl.classList.remove('updating'), 500);
            }
          } else {
            if (timeLeft <= 0) {
              advanceStep();
            } else {
              timeLeft -= 1;
            }
          }
          updateDisplay();
        }, 1000);
      }
      updateDisplay();
    }

    function pauseTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      active = false;
      statusEl.textContent = 'Paused';
      pauseBtn.disabled = true;
      exitFullscreen();
      updateDisplay();
    }

    function resetTimer() {
      const settings = getSettings();
      pauseTimer();
      stepIndex = 0;
      round = 1;
      currentSession = 1;
      isBetweenRepeats = false;
      repeatDelayLeft = 0;
      timeLeft = settings.steps[0].duration;
      isCountdown = false;
      countdownTime = 0;
      statusEl.textContent = 'Ready to start';
      exitFullscreen();
      updateDisplay();
    }

    function onInputChanged() {
      resetTimer();
    }

    addStepBtn.addEventListener('click', () => {
      intervalList.appendChild(createIntervalRow({ type: 'Rest', min: 0, sec: 15 }));
      resetTimer();
    });

    saveBtn.addEventListener('click', saveTimer);
    loadTimerSelect.addEventListener('change', loadTimer);
    deleteBtn.addEventListener('click', deleteTimer);

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    [roundsInput, repeatCountInput, repeatDelayInput, fullscreenInput].forEach(input => input.addEventListener('input', onInputChanged));

    setDefaultIntervals();
    populateSavedTimers();
    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
      resetTimer();
    });
  </script>
</body>
</html>
